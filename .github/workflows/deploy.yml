name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd /home/ec2-user

            # 기존 코드 삭제
            rm -rf app

            # 최신 코드 받기 (git clone)
            git clone https://github.com/ChoiFerriswheel/AWS-First-Project.git app

            # nginx 폴더로 복사
            sudo cp -r app/* /usr/share/nginx/html/

            # nginx 재시작
            sudo nginx -t
            sudo systemctl reload nginx
